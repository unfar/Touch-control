name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Wrapper & Build
        run: |
          set -euo pipefail
          # gradle command is provided by setup-gradle action
          echo "::group::Gradle Version"
          gradle --version
          echo "::endgroup::"

          echo "::group::Generate Wrapper"
          gradle wrapper --gradle-version=8.7
          echo "::endgroup::"

          echo "::group::Build APK"
          export ANDROID_HOME="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "::endgroup::"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
