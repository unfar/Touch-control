name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          # First ensure Android SDK is set
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-not set}"
          echo "ANDROID_HOME=${ANDROID_HOME:-not set}"
          ls /usr/local/lib/android/sdk/ 2>/dev/null | head -5
          
          # Build - use assembleDebug without :app: prefix  
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Find and Upload APK
        if: always()
        run: |
          echo "Searching for APK files..."
          find /home/runner -name "*.apk" 2>/dev/null || true
          find /github -name "*.apk" 2>/dev/null || true
          find . -name "*.apk" -type f 2>/dev/null
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: |
            *.apk
            **/*.apk
          if-no-files-found: warn
