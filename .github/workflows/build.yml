name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle & Build
        run: |
          set -euo pipefail
          echo "::group::Download Gradle"
          curl -sL --connect-timeout 30 --max-time 120 \
            "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle.zip
          echo "Download OK"
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "::endgroup::"

          echo "::group::Generate Wrapper"
          /tmp/gradle-8.7/bin/gradle wrapper --gradle-version=8.7
          echo "::endgroup::"

          echo "::group::Build APK"
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "::endgroup::"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
