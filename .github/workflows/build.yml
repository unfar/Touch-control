name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle & Build
        shell: bash
        run: |
          set -e  # exit on error
          echo "=== Downloading Gradle 8.7 ==="
          curl -sL --retry 3 "https://services.gradle.org/distributions/gradle-8.7-bin.zip" -o /tmp/gradle.zip
          echo "=== Extracting ==="
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE_HOME=/tmp/gradle-8.7
          echo "=== Generating Wrapper ==="
          $GRADLE_HOME/bin/gradle wrapper --gradle-version=8.7
          echo "=== Building APK ==="
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
