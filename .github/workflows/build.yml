name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== Looking for APKs ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Build output dir ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: |
            app/build/outputs/apk/**/*.apk
            **/build/outputs/apk/**/*.apk

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
