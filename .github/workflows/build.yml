name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/34.0.0:$PATH
          
          # Install SDK components (non-interactive)
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | grep -v "^\[=" | tail -5
          
          # Download Gradle wrapper JAR from official release
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -sL --retry 3 \
            "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          # Build using wrapper (this auto-downloads Gradle 8.7 from gradle.org)
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchControl-APK
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
